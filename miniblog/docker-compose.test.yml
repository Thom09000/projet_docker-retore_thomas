services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    ports:
      - "3307:3306"   # ⬅️ différent
    volumes:
      - db_data_test:/var/lib/mysql   # ⬅️ volume séparé
      - ./sql:/docker-entrypoint-initdb.d/:ro

  app:
    image: php:8.2-apache
    command:
      bash -c "
        apt-get update && apt-get install -y msmtp &&
        echo 'host mailhog' > /etc/msmtprc &&
        echo 'port 1025' >> /etc/msmtprc &&
        echo 'from webmaster@miniblog.local' >> /etc/msmtprc &&
        echo 'sendmail_path=/usr/bin/msmtp -t' > /usr/local/etc/php/conf.d/mail.ini &&
        docker-php-ext-install pdo_mysql &&
        apache2-foreground"
    restart: unless-stopped
    ports:
      - "8090:80"   # ⬅️ différent
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8082:80"   # ⬅️ différent
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1026:1025"   # ⬅️ différent
      - "8026:8025"   # ⬅️ différent

volumes:
  db_data_test:   # ⬅️ volume séparé

networks:
  miniblog_net:
    driver: bridge